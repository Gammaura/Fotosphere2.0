<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Fotosphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #2b2f3e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ═══ DECORATIVE SHAPES ═══ */
        .shape {
            position: absolute;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            z-index: 0;
        }

        .shape-1 {
            width: 320px;
            height: 380px;
            background: linear-gradient(160deg, #3b4a8a, #2d3a6e);
            top: -40px;
            left: -60px;
            transform: rotate(-15deg);
        }

        .shape-2 {
            width: 200px;
            height: 280px;
            background: linear-gradient(160deg, #4ecdc4, #3ab5a8);
            top: 60px;
            left: 40px;
            border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%;
            transform: rotate(10deg);
            opacity: 0.85;
        }

        .shape-3 {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #5a6fd6);
            bottom: 80px;
            right: -30px;
            border-radius: 50%;
            opacity: 0.15;
        }

        /* ═══ LOGIN CARD ═══ */
        .login-card {
            background: #343849;
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo-wrap {
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #4ecdc4, #667eea);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 0.8rem;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        .logo-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }

        .logo-sub {
            font-size: 0.8rem;
            color: #8b90a5;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .welcome {
            font-size: 1.3rem;
            font-weight: 700;
            color: #e0e2ea;
            margin-bottom: 2rem;
        }

        /* ═══ FORM ═══ */
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: #a0a4b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrap {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid #4a4e63;
            color: #e0e2ea;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input::placeholder {
            color: #5a5e73;
        }

        .form-group input:focus {
            border-bottom-color: #4ecdc4;
        }

        .toggle-pw {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #5a5e73;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-pw:hover {
            color: #4ecdc4;
        }

        .btn-login {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4ecdc4, #56d6ce);
            color: #1a1e2e;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: #ff6b6b;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
            background: rgba(255, 107, 107, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #5a5e73;
        }

        .footer-text a {
            color: #4ecdc4;
            text-decoration: none;
            font-weight: 600;
        }

        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.2rem;
        }

        .remember-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #a0a4b8;
            font-weight: 500;
            user-select: none;
        }

        .remember-label input[type=checkbox] {
            display: none;
        }

        .check-box {
            width: 18px;
            height: 18px;
            border: 2px solid #4a4e63;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .check-box::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 2px;
            background: #4ecdc4;
            transform: scale(0);
            transition: transform 0.15s ease;
        }

        .remember-label input:checked + .check-box {
            border-color: #4ecdc4;
        }

        .remember-label input:checked + .check-box::after {
            transform: scale(1);
        }

        @media (max-width: 500px) {
            .login-card {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }

            .shape-1 {
                width: 200px;
                height: 240px;
            }

            .shape-2 {
                width: 130px;
                height: 180px;
            }
        }
    </style>
</head>

<body>
    <!-- Decorative shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <div class="login-card">
        <div class="logo-wrap">
            <div class="logo-icon">F</div>
            <div class="logo-title">Fotosphere</div>
            <div class="logo-sub">Admin Control Panel</div>
        </div>

        <div class="welcome">Welcome Back!</div>

        <div class="error" id="error-msg">Username atau password salah!</div>

        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <input type="text" id="username" placeholder="Masukkan username" required autocomplete="off">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-pw" onclick="togglePassword()">👁</button>
                </div>
            </div>
            <div class="remember-row">
                <label class="remember-label">
                    <input type="checkbox" id="remember">
                    <span class="check-box"></span>
                    Simpan Sandi
                </label>
            </div>
            <button type="submit" class="btn-login" id="btn-login">Sign In</button>
        </form>

        <div class="footer-text">
            <a href="/">← Kembali ke Kiosk</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            const fd = new FormData();
            fd.append('username', u);
            fd.append('password', p);
            fd.append('remember', document.getElementById('remember').checked ? '1' : '0');

            const res = await fetch('/api/admin/login', { method: 'POST', body: fd });
            if (res.ok) {
                window.location.href = '/admin';
            } else {
                document.getElementById('error-msg').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
