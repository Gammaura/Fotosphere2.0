<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Fotosphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f2f2f2; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #fff; border-radius: 24px; padding: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid #1a1a1a; width: 100%; max-width: 360px; text-align: center; }
        h1 { font-weight: 900; margin-top: 0; letter-spacing: 1px; color: #1a1a1a; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        .form-group label { display: block; font-weight: 800; font-size: 0.85rem; margin-bottom: 6px; color: #1a1a1a; }
        .form-group input { width: 100%; padding: 12px; border: 2.5px solid #e0e0e0; border-radius: 12px; font-size: 1rem; font-family: inherit; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #1a1a1a; }
        .btn { display: block; width: 100%; padding: 14px; background: #e91e63; color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 1rem; transition: transform 0.15s; letter-spacing: 1px; }
        .btn:active { transform: scale(0.96); }
        .error { color: #e91e63; font-weight: 800; font-size: 0.8rem; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>FOTOSPHERE</h1>
        <p>Admin Control Panel</p>
        <div class="error" id="error-msg">Username atau password salah!</div>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">LOGIN</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const fd = new FormData();
            fd.append('username', u);
            fd.append('password', p);
            
            const res = await fetch('/api/admin/login', { method: 'POST', body: fd });
            if (res.ok) {
                window.location.href = '/admin';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
